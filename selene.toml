# Конфигурация линтера selene для GoldenLand (Roblox / Luau).
# Запуск: selene src
# При первом запуске selene сгенерирует стандартную библиотеку Roblox для std = "roblox".
std = "roblox"

[lints]
# Сервисы намеренно держат пустые функции-заглушки и тени локальных WorldService/require,
# поэтому смягчаем некоторые шумные правила. При желании можно ужесточить позже.
shadowing = "warn"
